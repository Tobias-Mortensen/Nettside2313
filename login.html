<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Epstein Island</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <button onclick="window.location.href='/'">Front Page</button>
            <button onclick="window.location.href='/site'">Homepage</button>
            <button onclick="window.location.href='/login'">Log In</button>
            <button onclick="window.location.href='/signup'">Sign Up</button>
            <button onclick="window.location.href='/faq'">FAQ</button>
        </nav>
    </header>

    <main class="bg-container">
        <div class="background-blurred"></div>
        <div class="dark-overlay"></div>
        
        <section class="login-wrapper">
            <div class="login-card">
                <h2>Access Portal</h2>
                <p>Verify your credentials to proceed</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" name="username" placeholder="Username" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                    </div>
                    <div id="login-error" style="display:none; background:rgba(255,60,60,0.15); border:1px solid rgba(255,80,80,0.35); border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:13px; color:#ff8080; text-align:center; letter-spacing:0.5px;"></div>
                    <button type="submit" class="login-btn">Initialize Session</button>
                </form>
                
                <div class="login-footer">
                    <a href="/signup" class="forgot-pw">Need an account? Sign Up</a>
                    <a href="#" class="forgot-pw">Forgot Password?</a>
                </div>
            </div>
        </section>

        <div class="background-sharp" id="sharpLayer"></div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errorBox = document.getElementById('login-error');
            errorBox.style.display = 'none';
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: form.username.value,
                    password: form.password.value
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/site';
            } else {
                errorBox.textContent = data.error || 'Login failed.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
